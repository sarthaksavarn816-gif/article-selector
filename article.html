<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Explorer</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 1.5rem;
        }
        .topics {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .topic {
            padding: 0.5rem 0.75rem;
            border: 1px solid #444;
            border-radius: 0.5rem;
            background: #f4f4f4;
            cursor: pointer;
        }
        .topic:hover {
            background: #eaeaea;
        }
        .news-item {
            padding: 0.75rem;
            border-bottom: 1px solid #ddd;
        }
        .news-item a {
            text-decoration: none;
            color: #0b69ff;
            font-weight: 600;
        }
        #news-container {
            max-width: 680px;
        }
    </style>
</head>
<body>
    <section class="topics" aria-label="Topics">
        <button class="topic" data-topic="AI">AI</button>
        <button class="topic" data-topic="javascript">JavaScript</button>
        <button class="topic" data-topic="startup">Startup</button>
        <button class="topic" data-topic="programming">Programming</button>
    </section>

    <section id="news-container" aria-live="polite">
        <p>Select a topic above to load news.</p>
    </section>

    <script>
        const newsContainer = document.getElementById('news-container');

        async function fetchNews(topic) {
            try {
                const url = `https://hn.algolia.com/api/v1/search?query=${encodeURIComponent(topic)}`;
                const response = await fetch(url);
                const data = await response.json();
                return data.hits || [];
            } catch (error) {
                console.error('Error fetching news:', error);
                return [];
            }
        }

        function showNews(articles) {
            if (!Array.isArray(articles) || articles.length === 0) {
                newsContainer.innerHTML = '<p>No news found for this topic.</p>';
                return;
            }

            newsContainer.innerHTML = '';

            articles.forEach(article => {
                const title = article.title || article.story_title || 'No Title';
                const link = article.url || article.story_url || '#';

                const item = document.createElement('div');
                item.className = 'news-item';

                const anchor = document.createElement('a');
                anchor.href = link;
                anchor.target = '_blank';
                anchor.rel = 'noopener noreferrer';
                anchor.textContent = title;

                item.appendChild(anchor);
                newsContainer.appendChild(item);
            });
        }

        document.querySelectorAll('.topic').forEach(button => {
            button.addEventListener('click', async () => {
                const topic = button.dataset.topic;
                if (!topic) return;

                newsContainer.innerHTML = '<p>Loading…</p>';
                const articles = await fetchNews(topic);
                showNews(articles);
            });
        });
    </script>
</body>
</html>
